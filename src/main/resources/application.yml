spring:
  application:
    name: open-rewards-backend
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/openrewards_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"