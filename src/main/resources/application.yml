spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  application:
    name: open-rewards-backend
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/openrewards_db}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  flyway:
    schemas: public
    default-schema: public

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:open-rewards-default}

api:
  security:
    token:
      secret: ${JWT_SECRET:w5fPtFSniROy8fEfsNcGoF0p7S472JCafj5tEzl0byiqNne1wkEBR3zSFot+U4HDtnXFsbaobtV+D1JH5cCdwA==}
      expiration: ${JWT_EXPIRATION:7200000}