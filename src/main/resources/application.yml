spring:
  data:
    redis:
      host: localhost
      port: 6379
  application:
    name: open-rewards-backend
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/openrewards_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus # Libera a porta pro Prometheus ler
  endpoint:
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name:open-rewards-default}
